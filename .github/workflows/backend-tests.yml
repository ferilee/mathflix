name: Backend Tests

on:
  push:
    paths:
      - "api/**"
      - "mathflix-billing/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "api/**"
      - "mathflix-billing/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install API deps
        working-directory: api
        run: bun install --frozen-lockfile

      - name: Run API tests
        working-directory: api
        run: bun test

  test-billing:
    name: Test Billing Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Billing deps
        working-directory: mathflix-billing
        run: bun install --frozen-lockfile

      - name: Run Billing tests
        working-directory: mathflix-billing
        run: bun test
