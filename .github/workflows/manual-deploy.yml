name: Manual Push GHCR (ferilee/mathflix:latest)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Menggunakan lowercase untuk menghindari masalah case-sensitivity di GHCR
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # Gunakan GHCR_TOKEN jika ada, jika tidak gunakan GITHUB_TOKEN bawaan
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Mengonversi nama image ke lowercase (standar Docker/GHCR)
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mathflix:latest
