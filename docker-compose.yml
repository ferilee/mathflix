services:
  frontend:
    build:
      context: .
    container_name: mathflix-frontend
    ports:
      - "9111:80"
    env_file:
      - .env
    networks:
      - ferileenet
    restart: always

networks:
  ferileenet:
    external: true

# Catatan: Layanan Storage (RustFS) telah dipindahkan ke folder _infrastructure
# untuk digunakan secara global oleh semua proyek melalui network 'ferileenet'.
